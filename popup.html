<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Stop Scrolling</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="container">
      <div id="title">
        <p>Stop Scrolling</p>

        <label class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- Timer Input Section -->
      <div class="timer-section">
        <p>Daily Time Limit</p>

        <div class="timer-input">
          <input
            type="number"
            id="timeLimit"
            placeholder="Enter minutes"
            min="1"
          />
          <span>minutes</span>
        </div>

        <button id="saveTime">Save</button>
      </div>

      <!-- Time Remaining Section -->
      <div class="remaining-time">
        <p>Time Remaining Today</p>
        <h2 id="timeLeft">--:--</h2>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
